query getNotifications($limit: Int, $page_token: String, $update_last_seen: Boolean!) {
	getNotifications(limit: $limit, page_token: $page_token, update_last_seen: $update_last_seen) {
		page_token
		last_seen
		unread
		notifications {
			... on AddedNode {
				id
				notification_type
				created_at
				triggering_user {
					user_id
					full_name
					email
					snapshot_user_id
				}
				added_node {
					node_id
					name
					type
					created_at
					owner_id
					snapshot_node_id
				}
				added_node_type
				destination_folder {
					name
					node_id
					type
					created_at
					owner_id
					snapshot_node_id
				}
			}
			... on NewShare {
				id
				notification_type
				created_at
				triggering_user {
					user_id
					full_name
					email
					snapshot_user_id
				}
				node {
					node_id
					name
					type
					created_at
					owner_id
					snapshot_node_id
				}
			}
			... on RemovedNode {
				id
				notification_type
				created_at
				triggering_user {
					user_id
					full_name
					email
					snapshot_user_id
				}
				origin_folder {
					node_id
					name
					type
					created_at
					owner_id
					snapshot_node_id
				}
				removed_node {
					node_id
					name
					type
					created_at
					owner_id
					snapshot_node_id
				}
				removed_node_type
			}
			... on TransferredOwnership {
				id
				notification_type
				created_at
				triggering_user {
					user_id
					full_name
					email
					snapshot_user_id
				}
				receiving_user {
					user_id
					full_name
					email
					snapshot_user_id
				}
				number_of_nodes
				resulting_node {
					node_id
					name
					type
					created_at
					owner_id
					snapshot_node_id
				}
			}
			... on SucceededRecording {
				id
				notification_type
				created_at
				recording_node {
					snapshot_node_id
					node_id
					name
					type
					created_at
					owner_id
				}
				recording_destination_node {
					snapshot_node_id
					node_id
					name
					type
					created_at
					owner_id
				}
			}
		}
	}
}
