mutation updateShares($node_id: ID!, $share_target_ids: [ID!]!, $permission: SharePermission!) {
	updateShares(node_id: $node_id, share_target_ids: $share_target_ids, permission: $permission) {
		permission
		share_target {
			... on User {
				email
				full_name
				id
			}
			... on DistributionList {
				id
				name
			}
		}
		created_at
		node {
			id
		}
	}
}
